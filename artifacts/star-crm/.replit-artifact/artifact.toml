kind = "web"
previewPath = "/"
title = "Star CRM"
version = "1.0.0"
id = "artifacts/star-crm"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18321

[services.development]
run = "pnpm --filter @workspace/star-crm run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/star-crm", "run", "build" ]
publicDir = "artifacts/star-crm/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18321"
BASE_PATH = "/"
